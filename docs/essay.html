<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Essay — Buddy Williams</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand" style="text-decoration:none;">Buddy Williams</a>
  <div class="nav-links">
    <a href="resume.html">Resume</a>
    <a href="https://x.com/BuddyIterate" target="_blank" rel="noopener">X</a>
  </div>
</nav>

<div class="essay-wrap">
  <div class="essay-back"><a href="index.html">← All writing</a></div>
  <div id="content" class="loading">Loading…</div>
</div>

<script>
const RAW = 'https://raw.githubusercontent.com/buwilliams/buddy-williams-writings/main/essays/';

function md(text) {
  const lines = text.split('\n');
  let out = '';
  let inUL = false;
  let inP = false;

  function close() {
    if (inUL) { out += '</ul>\n'; inUL = false; }
    if (inP)  { out += '</p>\n';  inP  = false; }
  }

  function inline(s) {
    return s
      .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*([^*\n]+?)\*/g, '<em>$1</em>')
      .replace(/`([^`]+?)`/g, '<code>$1</code>');
  }

  for (let i = 0; i < lines.length; i++) {
    const raw = lines[i];
    const t = raw.trim();
    const ln = inline(raw);

    if (/^### /.test(raw))      { close(); out += `<h3>${inline(raw.slice(4))}</h3>\n`; }
    else if (/^## /.test(raw))  { close(); out += `<h2>${inline(raw.slice(3))}</h2>\n`; }
    else if (/^# /.test(raw))   { close(); out += `<h1>${inline(raw.slice(2))}</h1>\n`; }
    else if (/^> /.test(raw))   { close(); out += `<blockquote><p>${inline(raw.slice(2))}</p></blockquote>\n`; }
    else if (/^- /.test(raw))   {
      if (inP) { out += '</p>\n'; inP = false; }
      if (!inUL) { out += '<ul>\n'; inUL = true; }
      out += `<li>${inline(raw.slice(2))}</li>\n`;
    }
    else if (/^---$/.test(t))   { close(); out += '<hr>\n'; }
    else if (t === '')           { close(); }
    else {
      if (inUL) { out += '</ul>\n'; inUL = false; }
      if (!inP) { out += '<p>'; inP = true; } else { out += ' '; }
      out += inline(raw);
    }
  }

  close();
  return out;
}

(async () => {
  const el = document.getElementById('content');
  const slug = new URLSearchParams(location.search).get('slug');

  if (!slug) { el.innerHTML = '<p>No essay specified.</p>'; return; }

  try {
    const res = await fetch(RAW + slug + '.md');
    if (!res.ok) throw new Error();
    const text = await res.text();
    el.className = '';
    el.innerHTML = md(text);
    const h1 = el.querySelector('h1');
    if (h1) document.title = h1.textContent + ' — Buddy Williams';
  } catch {
    el.innerHTML = '<p>Essay not found. <a href="index.html">← Back</a></p>';
  }
})();
</script>

</body>
</html>
