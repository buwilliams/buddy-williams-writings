<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}{{ cfg.name }} — {{ cfg.positioning }}{% endblock %}</title>
    <meta
      name="description"
      content="{% block description %}{{ cfg.name }}. {{ cfg.tagline }} Free consulting for technology founders.{% endblock %}"
    />
    <meta property="og:title" content="{{ cfg.name }} — {{ cfg.positioning }}" />
    <meta property="og:description" content="{{ cfg.tagline }}" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/static/img/profile.jpg" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/site.css?v={{ asset_version }}" />

    <!-- Cal.com embed loader -->
    <script type="text/javascript">
      (function (C, A, L) { let p = function (a, ar) { a.q.push(ar); }; let d = C.document; C.Cal = C.Cal || function () { let cal = C.Cal; let ar = arguments; if (!cal.loaded) { cal.ns = {}; cal.q = cal.q || []; d.head.appendChild(d.createElement("script")).src = A; cal.loaded = true; } if (ar[0] === L) { const api = function () { p(api, arguments); }; const namespace = ar[1]; api.q = api.q || []; if (typeof namespace === "string") { cal.ns[namespace] = cal.ns[namespace] || api; p(cal.ns[namespace], ar); p(cal, ["initNamespace", namespace]); } else p(cal, ar); return; } p(cal, ar); }; })(window, "https://app.cal.com/embed/embed.js", "Cal");
      Cal("init", { origin: "https://cal.com" });
      Cal("ui", { hideEventTypeDetails: false, layout: "month_view" });
    </script>
  </head>
  <body class="{% block body_class %}{% endblock %}" data-cal-slug="{{ cfg.cal_link | safe }}">
    <header class="site-header">
      <a class="brand" href="/">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">{{ cfg.name }}</span>
      </a>
      <nav class="site-nav">
        <a href="/writings" class="{% if page == 'writings' %}is-active{% endif %}">Writing</a>
        <a href="/consulting" class="{% if page == 'consulting' %}is-active{% endif %}">Consulting</a>
        <a href="{{ cfg.refine.url }}" target="_blank" rel="noopener">Refine</a>
        <a class="nav-cta" href="{{ cfg.scheduler_url }}" target="_blank" rel="noopener"
          >{{ cfg.scheduler_label }}</a
        >
      </nav>
    </header>

    {% block content %}{% endblock %}

    <footer class="site-footer">
      <div class="footer-inner">
        <div class="footer-brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <p class="footer-name">{{ cfg.name }}</p>
            <p class="footer-tag">{{ cfg.tagline }}</p>
          </div>
        </div>
        <nav class="footer-links">
          <a href="/writings">Writing</a>
          <a href="/consulting">Consulting</a>
          <a href="/resume">Résumé</a>
          <a href="{{ cfg.x_url }}" target="_blank" rel="noopener">X</a>
          <a href="{{ cfg.substack_url }}" target="_blank" rel="noopener">Substack</a>
          <a href="{{ cfg.github_url }}" target="_blank" rel="noopener">GitHub</a>
        </nav>
      </div>
      <p class="footer-fine">© {{ cfg.name }}. Ideas meant to spread.</p>
    </footer>
    <script src="/static/js/site.js?v={{ asset_version }}" defer></script>
  </body>
</html>
